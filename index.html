<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Notes</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1f1611">

<style>

body{
margin:0;
background:#1f1611;
color:#f5eee6;
font-family:Georgia,serif;
}

/* TITLE */

header{
text-align:center;
font-size:48px;
padding:25px;
letter-spacing:4px;
font-style:italic;
color:#e6d5c3;
text-shadow:1px 1px 2px #000;
}

/* CONTAINER */

.container{
padding:20px;
max-width:800px;
margin:auto;
}

/* BUTTONS */

button{
padding:14px;
border:none;
border-radius:8px;
margin:8px;
font-size:18px;
cursor:pointer;
}

.voiceBtn{background:#7a4f2c;color:white}
.stopBtn{background:#a93232;color:white}
.writeBtn{background:#4d7a5a;color:white}

/* TEXTAREA */

textarea{
width:100%;
height:160px;
border-radius:10px;
border:none;
padding:12px;
font-size:19px;
font-family:Georgia,serif;
}

/* ENTRY CARD */

.entry{
background:#2d1f18;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.date{
opacity:.7;
font-size:14px;
margin-bottom:8px;
}

.text{
font-size:22px;
line-height:1.7;
}

.delete{
margin-top:10px;
background:#8f2d2d;
color:white;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* LOCK SCREEN */

#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1f1611;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

#lockScreen input{
padding:12px;
font-size:18px;
margin:10px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<div id="lockScreen">
<h2>Create / Enter Password</h2>
<input type="password" id="passwordInput">
<button onclick="unlock()">Enter</button>
</div>

<header>My Notes</header>

<div class="container">

<div style="text-align:center">
<button class="voiceBtn" onclick="startVoice()">Voice</button>
<button class="stopBtn" onclick="stopVoice()">Stop</button>
<button class="writeBtn" onclick="toggleWrite()">Write</button>
</div>

<div id="writeBox" style="display:none">
<textarea id="manualText"></textarea>
<button onclick="saveManual()">Save</button>
</div>

<div id="entries"></div>

</div>

<script>

/* PASSWORD */

function unlock(){

let saved=localStorage.getItem("appPassword")
let entered=document.getElementById("passwordInput").value

if(!saved){
localStorage.setItem("appPassword",entered)
document.getElementById("lockScreen").style.display="none"
return
}

if(entered===saved){
document.getElementById("lockScreen").style.display="none"
}else{
alert("Wrong password")
}

}

/* TEXT CLEANING */

function cleanText(text){

text=text.replace(/\b(um|uh|like|you know)\b/gi,"")
text=text.replace(/\s+/g," ")

return text.charAt(0).toUpperCase()+text.slice(1)

}

/* SWAHILI SIMPLE TRANSLATION */

function translateSwahili(text){

const dict={
"leo":"today",
"rafiki":"friend",
"nyumbani":"at home",
"shule":"school",
"chakula":"food",
"nilienda":"i went",
"nilikuwa":"i was",
"niko":"i am",
"nina":"i have",
"nataka":"i want",
"furaha":"happy",
"nzuri":"good",
"mbaya":"bad"
}

let words=text.toLowerCase().split(" ")

words=words.map(w=>dict[w]||w)

return words.join(" ")

}

/* VOICE */

let recognition
let recording=false

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

recognition=new SpeechRecognition()

recognition.lang="en-US"
recognition.continuous=true
recognition.interimResults=false

recording=true
recognition.start()

recognition.onresult=function(event){

let transcript=""

for(let i=event.resultIndex;i<event.results.length;i++){
transcript+=event.results[i][0].transcript
}

transcript=translateSwahili(transcript)
transcript=cleanText(transcript)

saveEntry(transcript)

}

recognition.onend=function(){
if(recording){
recognition.start()
}
}

}

function stopVoice(){
recording=false
if(recognition) recognition.stop()
}

/* SAVE ENTRY */

function saveEntry(text){

let entries=JSON.parse(localStorage.getItem("entries")||"[]")

entries.unshift({
date:new Date().toLocaleString(),
text:text
})

localStorage.setItem("entries",JSON.stringify(entries))

renderEntries()

}

function saveManual(){

let text=document.getElementById("manualText").value

if(!text) return

saveEntry(cleanText(translateSwahili(text)))

document.getElementById("manualText").value=""

}

/* DELETE */

function deleteEntry(i){

let entries=JSON.parse(localStorage.getItem("entries")||"[]")

entries.splice(i,1)

localStorage.setItem("entries",JSON.stringify(entries))

renderEntries()

}

/* RENDER */

function renderEntries(){

let entries=JSON.parse(localStorage.getItem("entries")||"[]")

let html=""

entries.forEach((e,i)=>{

html+=`
<div class="entry">
<div class="date">${e.date}</div>
<div class="text">${e.text}</div>
<button class="delete" onclick="deleteEntry(${i})">Delete</button>
</div>
`

})

document.getElementById("entries").innerHTML=html

}

/* MENU */

function toggleWrite(){

let box=document.getElementById("writeBox")

box.style.display=
box.style.display==="none"?"block":"none"

}

renderEntries()

if('serviceWorker' in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
