<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>My Notes</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2c1d14">

<style>

body{
margin:0;
font-family:Georgia,serif;
background:#2c1d14;
color:#f5eee6;
}

header{
text-align:center;
font-size:40px;
padding:20px;
border-bottom:1px solid #4a3428;
}

.container{
padding:20px;
max-width:800px;
margin:auto;
}

button{
padding:15px;
border:none;
border-radius:10px;
margin:10px 5px;
font-size:18px;
cursor:pointer;
}

.voiceBtn{background:#8b5e3c;color:white}
.stopBtn{background:#b33939;color:white}
.writeBtn{background:#4a7c59;color:white}

textarea{
width:100%;
height:150px;
border-radius:10px;
border:none;
padding:10px;
font-size:18px;
font-family:Georgia,serif;
}

.entry{
background:#3a261b;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.date{
font-size:14px;
opacity:.7;
margin-bottom:10px;
}

.text{
font-size:22px;
line-height:1.6;
}

.comment{
margin-top:10px;
font-style:italic;
opacity:.8;
}

.delete{
margin-top:10px;
background:#992d2d;
color:white;
padding:8px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>📔 My Notes</header>

<div class="container">

<div style="text-align:center">

<button class="voiceBtn" onclick="startVoice()">🎤 Voice</button>

<button class="stopBtn" onclick="stopVoice()">⏹ Stop</button>

<button class="writeBtn" onclick="toggleWrite()">✍ Write</button>

</div>

<div id="writeBox" style="display:none">

<textarea id="manualText" placeholder="Write something to remember..."></textarea>

<button onclick="saveManual()">Save</button>

</div>

<div id="entries"></div>

</div>

<script>

let recognition
let recording=false

const comments=[
"Thanks for writing this down.",
"That sounds like an important moment.",
"Little memories matter.",
"Your thoughts are safe here.",
"This page holds part of your story."
]

function cleanText(text){

text=text.replace(/\b(um|uh|like|you know)\b/gi,"")

text=text.replace(/\s+/g," ")

return text.charAt(0).toUpperCase()+text.slice(1)

}

function translateSwahili(text){

const dictionary={
"leo":"today",
"nilienda":"i went",
"rafiki":"friend",
"nyumbani":"home",
"shule":"school",
"chakula":"food",
"niliona":"i saw",
"furaha":"happy",
"nzuri":"good",
"mbaya":"bad"
}

let words=text.split(" ")

words=words.map(w=>{
let lw=w.toLowerCase()
if(dictionary[lw]) return dictionary[lw]
return w
})

return words.join(" ")

}

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

recognition=new SpeechRecognition()

recognition.lang="en-US"

recognition.continuous=true

recognition.interimResults=false

recording=true

recognition.start()

recognition.onresult=function(event){

let transcript=""

for(let i=event.resultIndex;i<event.results.length;i++){

transcript+=event.results[i][0].transcript

}

transcript=translateSwahili(transcript)

transcript=cleanText(transcript)

saveEntry(transcript)

}

recognition.onend=function(){

if(recording){
recognition.start()
}

}

}

function stopVoice(){

recording=false

if(recognition) recognition.stop()

}

function saveEntry(text){

let entries=JSON.parse(localStorage.getItem("journalEntries")||"[]")

entries.unshift({
date:new Date().toLocaleString(),
text:text,
comment:comments[Math.floor(Math.random()*comments.length)]
})

localStorage.setItem("journalEntries",JSON.stringify(entries))

renderEntries()

}

function saveManual(){

let text=document.getElementById("manualText").value

if(!text) return

text=cleanText(text)

saveEntry(text)

document.getElementById("manualText").value=""

}

function deleteEntry(i){

let entries=JSON.parse(localStorage.getItem("journalEntries")||"[]")

entries.splice(i,1)

localStorage.setItem("journalEntries",JSON.stringify(entries))

renderEntries()

}

function renderEntries(){

let entries=JSON.parse(localStorage.getItem("journalEntries")||"[]")

let html=""

entries.forEach((e,i)=>{

html+=`
<div class="entry">
<div class="date">${e.date}</div>
<div class="text">${e.text}</div>
<div class="comment">${e.comment}</div>
<button class="delete" onclick="deleteEntry(${i})">Delete</button>
</div>
`

})

document.getElementById("entries").innerHTML=html

}

function toggleWrite(){

let box=document.getElementById("writeBox")

box.style.display=box.style.display=="none"?"block":"none"

}

renderEntries()

if('serviceWorker' in navigator){

navigator.serviceWorker.register('service-worker.js')

}

</script>

</body>
</html>
